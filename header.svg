<svg viewBox="0 0 900 320" width="900" height="320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Jiyad Hussain - AI Learning Engineer">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0 H0 V24" fill="none" stroke="#111111" stroke-width="1" opacity="0.06"/>
    </pattern>
    <clipPath id="marqueeClip">
      <rect x="0" y="266" width="900" height="54"/>
    </clipPath>
    <style>
      .title{font-family:'Arial Black','Arial Bold',Impact,'Helvetica Neue',Arial,sans-serif;font-weight:900;letter-spacing:-1px;}
      .body{font-family:'Trebuchet MS',Verdana,Arial,sans-serif;font-weight:700;letter-spacing:0.5px;}
      .mono{font-family:'Courier New',ui-monospace,monospace;font-weight:700;}
    </style>
  </defs>

  <!-- CANVAS -->
  <rect width="900" height="320" fill="#fdf9f0"/>
  <rect width="900" height="320" fill="url(#grid)"/>

  <!-- ================= FLOATING DECORATIVE SHAPES ================= -->

  <!-- mint circle (bob) -->
  <g>
    <circle cx="662" cy="72" r="17" fill="#111111"/>
    <circle cx="656" cy="66" r="17" fill="#3ddc97" stroke="#111111" stroke-width="2.5"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="3.6s" repeatCount="indefinite"/>
  </g>

  <!-- canary square (spin) -->
  <g transform="translate(772 60)">
    <rect x="-16" y="-16" width="32" height="32" fill="#111111" transform="translate(6 6)"/>
    <rect x="-16" y="-16" width="32" height="32" fill="#ffd23f" stroke="#111111" stroke-width="2.5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="9s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- coral triangle (bob) -->
  <g>
    <path d="M840 96 L866 140 L814 140 Z" fill="#111111" transform="translate(5 5)"/>
    <path d="M840 96 L866 140 L814 140 Z" fill="#ff6b5e" stroke="#111111" stroke-width="2.5" stroke-linejoin="round"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 10; 0 0" dur="4.4s" repeatCount="indefinite"/>
  </g>

  <!-- lilac plus (spin + pulse) -->
  <g transform="translate(724 186)">
    <g>
      <rect x="-6" y="-20" width="12" height="40" fill="#c8a2ff" stroke="#111111" stroke-width="2.5"/>
      <rect x="-20" y="-6" width="40" height="12" fill="#c8a2ff" stroke="#111111" stroke-width="2.5"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="-360 0 0" dur="11s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ================= INITIALS BLOCK (bob) ================= -->
  <g>
    <rect x="56" y="88" width="98" height="98" rx="10" fill="#111111"/>
    <rect x="48" y="80" width="98" height="98" rx="10" fill="#ff3d81" stroke="#111111" stroke-width="3.5"/>
    <text x="97" y="149" class="title" font-size="54" fill="#111111" text-anchor="middle">JH</text>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="3.2s" repeatCount="indefinite"/>
  </g>

  <!-- ================= HEADLINE ================= -->
  <text x="178" y="120" class="title" font-size="52" fill="#111111">JIYAD HUSSAIN</text>

  <!-- subtitle highlight box -->
  <g>
    <rect x="184" y="142" width="336" height="34" fill="#111111"/>
    <rect x="178" y="136" width="336" height="34" fill="#c8a2ff" stroke="#111111" stroke-width="2.5"/>
    <text x="196" y="159" class="body" font-size="17" fill="#111111">AI ENGINEER</text>
  </g>

  <!-- mono tagline + blinking cursor -->
  <text x="180" y="206" class="mono" font-size="14.5" fill="#111111">&#62; kaggler · colab · transformers · nlp</text>
  <rect x="512" y="194" width="10" height="15" fill="#ff3d81">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.05s" repeatCount="indefinite"/>
  </rect>

  <!-- ================= SCROLLING MARQUEE BAND ================= -->
  <rect x="0" y="266" width="900" height="54" fill="#ffd23f"/>
  <rect x="0" y="264" width="900" height="4" fill="#111111"/>
  <g clip-path="url(#marqueeClip)">
    <g class="mono" font-size="18" fill="#111111">
      <text x="0" y="300">PYTHON &#9733; PYTORCH &#9733; HUGGING FACE &#9733; TYPESCRIPT &#9733; SCIKIT-LEARN &#9733; PANDAS &#9733; NUMPY &#9733; KAGGLE &#9733; COLAB &#9733; NLP &#9733;&#160;</text>
      <text x="1080" y="300">PYTHON &#9733; PYTORCH &#9733; HUGGING FACE &#9733; TYPESCRIPT &#9733; SCIKIT-LEARN &#9733; PANDAS &#9733; NUMPY &#9733; KAGGLE &#9733; COLAB &#9733; NLP &#9733;&#160;</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1080 0" dur="18s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
