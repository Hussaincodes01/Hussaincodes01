name: Generate Snake Animation

on:
  # run every 12 hours so the snake stays current
  schedule:
    - cron: "0 */12 * * *"
  # allow manual runs from the Actions tab
  workflow_dispatch:
  # regenerate on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light&color_snake=ff3d81&color_dots=fdf9f0,ffd23f,c8a2ff,3ddc97,ff3d81

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
